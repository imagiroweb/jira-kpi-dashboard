# Optionnel : SMTP Mailcow depuis le backend sans passer par l’IP publique (évite Connection timeout).
#
# Mailcow est supposé installé sous /opt/mailcow-dockerized (compose lancé depuis ce dossier).
# Le nom du réseau Docker dépend du nom de projet Compose (souvent le nom du dossier) : à vérifier
# impérativement avec la commande ci-dessous, pas en devinant.
#
# Usage (fichier en DERNIER) :
#   cd /opt/jira-kpi-dashboard
#   docker compose -f docker-compose.prod.yml -f docker-compose.prod.ghcr.yml \
#     -f docker-compose.prod.scaleway.yml -f docker-compose.prod.mailcow.yml up -d
#
# 1) Réseau Mailcow (à lancer depuis n’importe où) :
#    docker network ls | grep mailcow
#    Exemples possibles : mailcow-dockerized_mailcow-network ou mailcowdockerized_mailcow-network
# 2) Conteneur Postfix :
#    docker ps --format '{{.Names}}' | grep postfix-mailcow
#    Ex. : mailcowdockerized-postfix-mailcow-1
# 3) Dans /opt/jira-kpi-dashboard/.env :
#    MAILCOW_DOCKER_NETWORK=<valeur exacte de l’étape 1>
#    SMTP_HOST=<nom de l’étape 2>
#    Préféré (Postfix Mailcow, même réseau Docker) :
#    SMTP_PORT=587
#    SMTP_SECURE=false
#    SMTP_TLS_SERVERNAME=mail.imagiro.fr
#    (STARTTLS est activé automatiquement pour le port 587 dans le backend.)
#    Variante TLS directe si 587 ne convient pas : SMTP_PORT=465, SMTP_SECURE=true
#    (+ SMTP_USER / SMTP_PASS / APP_BASE_URL comme avant)

services:
  backend:
    networks:
      - jira-kpi-network
      - mailcow-smtp

networks:
  mailcow-smtp:
    external: true
    name: ${MAILCOW_DOCKER_NETWORK:-mailcow-dockerized_mailcow-network}
